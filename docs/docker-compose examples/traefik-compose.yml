# Simple Traefik + pia-tun example
# This file is mostly to demonstrate that traefik labels go on pia-tun, not its dependents like qbittorrent

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

  pia-tun:
    image: x0lie/pia-tun:latest
    container_name: pia-tun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    cap_drop:
      - all
    environment:
      - TZ=America/New_York
      - PIA_LOCATION=ca_ontario,ca_toronto
      - PORT_SYNC_TYPE=qbittorrent
      - PORT_SYNC_URL=http://localhost:8080
      - LOCAL_NETWORKS=192.168.1.0/24,172.18.0.0/16
      - LOCAL_PORTS=8080
    secrets:
      - pia_user
      - pia_pass
    ports:
      - "8080:8080"
    networks:
      - web
    labels:
      # KEY POINT: Traefik labels must be on pia-tun, not qbittorrent
      # This is because qbittorrent shares pia-tun's network namespace
      # You can include multiple dependents here - qbit + sab, for example
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbit.example.com`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=web"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - ./qbittorrent/downloads:/downloads
    network_mode: "service:pia-tun"
    depends_on:
      - pia-tun

networks:
  web:
    driver: bridge

secrets:
  pia_user:
    file: ./secrets/pia_user
  pia_pass:
    file: ./secrets/pia_pass
