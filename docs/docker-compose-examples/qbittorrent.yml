services:
  pia-tun:
    image: x0lie/pia-tun:latest
    container_name: pia-tun
    cap_add:
      - NET_ADMIN
    cap_drop:
      - all
    environment:
      - TZ=America/New_York
      - PIA_LOCATION=ca_ontario,ca_ontario-so,ca_toronto
      - PS_CLIENT=qbittorrent
      - LOCAL_NETWORKS=192.168.1.0/24,172.18.0.0/16
      - LOCAL_PORTS=8080
      # Auth options for PS_CLIENT (choose one):
      # 1. Docker secrets (most secure) - see secrets section below
      # 2. Environment vars - set PS_USER/PS_PASS
      # 3. No auth - enable "Bypass authentication for clients on localhost" in qBittorrent settings (Options > WebUI > Authentication)
    secrets:
      - pia_user
      - pia_pass
      - ps_user
      - ps_pass
    ports:
      - 8080:8080

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - ./qbittorrent/downloads:/downloads
    network_mode: "service:pia-tun"
    depends_on:
      - pia-tun

secrets:
  pia_user:
    file: ./secrets/pia_user
  pia_pass:
    file: ./secrets/pia_pass
  ps_user:
    file: ./secrets/ps_user
  ps_pass:
    file: ./secrets/ps_pass