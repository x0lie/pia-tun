name: Test

# Run tests on pull requests only (develop.yml and release.yml handle push testing)
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'renovate.json'
      - '.editorconfig'
      - '.vscode/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'renovate.json'
      - '.editorconfig'
      - '.vscode/**'

env:
  DOCKERHUB_USERNAME: x0lie
  IMAGE_NAME: pia-tun

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx (for better caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Run the test suite
      - name: Run tests
        env:
          PIA_USER: ${{ secrets.PIA_USER }}
          PIA_PASS: ${{ secrets.PIA_PASS }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}:test
        run: |
          chmod +x testing/test.sh
          ./testing/test.sh

      # Upload logs if tests fail
      - name: Upload logs on failure
        if: failure()
        run: |
          docker logs ${{ env.IMAGE_NAME }}-test > test-logs.txt 2>&1 || true

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-logs.txt

  # Security scan with Trivy
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required to upload SARIF results to GitHub Security
      contents: read          # Required to checkout code
      actions: read           # Required to access workflow run information

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail on vulnerabilities (just report)

      # Upload results to GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Also show results in action log
      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
