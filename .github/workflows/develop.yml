name: Develop

on:
  push:
    branches:
      - develop
    paths:
      - '.github/**'
      - 'ca/**'
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'tools/**'
      - Dockerfile
      - go.mod
      - go.sum

env:
  DOCKERHUB_USERNAME: x0lie
  IMAGE_NAME: pia-tun

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  scan:
    uses: ./.github/workflows/scan.yml
    permissions:
      security-events: write
      actions: read
      contents: read

  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit
    needs: [lint, scan]
    permissions:
      contents: read

  # Build and push amd64 image to Docker Hub and GHCR with :develop tag
  build-and-push:
    name: Build and Push to Registries
    runs-on: ubuntu-latest
    needs: [test]  # Only run if tests pass
    permissions:
      contents: read   # Required to checkout code
      packages: write  # Required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push develop image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=develop
            SHA=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:develop
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ Develop Image Published

          **Docker Hub:**
          ```bash
          docker pull ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:develop
          ```

          **GitHub Container Registry:**
          ```bash
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:develop
          ```

          **Commit**: `${{ github.sha }}`
          **Platform**: linux/amd64
          EOF
