name: Develop

on:
  push:
    branches:
      - develop
    paths:
      - '.github/**'
      - 'ca/**'
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'tools/**'
      - Dockerfile
      - go.mod
      - go.sum

env:
  DOCKERHUB_USERNAME: x0lie
  IMAGE_NAME: pia-tun

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  scan:
    uses: ./.github/workflows/scan.yml
    permissions:
      security-events: write
      actions: read
      contents: read

  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit
    permissions:
      contents: read

  # Build and push amd64 image to Docker Hub and GHCR with :develop tag
  build-and-push:
    name: Build and Push to Registries
    runs-on: ubuntu-latest
    needs: [lint, scan, test]  # Only run if tests pass
    permissions:
      contents: read   # Required to checkout code
      packages: write  # Required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push develop image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=develop
            SHA=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:develop
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ Develop Image Published

          **Docker Hub:**
          ```bash
          docker pull ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:develop
          ```

          **GitHub Container Registry:**
          ```bash
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:develop
          ```

          **Commit**: `${{ github.sha }}`
          **Platform**: linux/amd64
          EOF
