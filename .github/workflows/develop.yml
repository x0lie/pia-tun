name: Develop Branch CI/CD

# Trigger on pushes to develop branch
on:
  push:
    branches:
      - develop

env:
  DOCKERHUB_USERNAME: olsonalexw # x0lie
  IMAGE_NAME: k8s-wireguard-pia # pia-tun

jobs:
  # Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run test suite
        env:
          PIA_USER: ${{ secrets.PIA_USER }}
          PIA_PASS: ${{ secrets.PIA_PASS }}
          PIA_LOCATION: us_california
          PORT_FORWARDING: false
          IMAGE_NAME: ${{ env.IMAGE_NAME }}:test
        run: |
          chmod +x testing/test.sh
          ./testing/test.sh

  # Security scan (non-blocking for develop)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail develop builds on vulnerabilities (warn only)

  # Build and push multi-arch image to Docker Hub with :develop tag
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [test]  # Only run if tests pass (skip security-scan dependency for faster feedback)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push amd64 image with :develop tag
      - name: Build and push develop image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Add a summary
      - name: Job Summary
        run: |
          echo "## ✅ Develop Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull the latest develop build:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:develop" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: linux/amd64 only (multi-arch in releases)" >> $GITHUB_STEP_SUMMARY
