name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label by changed files
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler-config.yml

      - name: Label by conventional commits
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const labelMap = {
              feat:     'feat',
              perf:     'perf',
              fix:      'fix',
              docs:     'docs',
              chore:    'chore',
              ci:       'ci',
              refactor: 'refactor',
            };

            const labelsToAdd = new Set();

            for (const { commit } of commits.data) {
              const subject = commit.message.split('\n')[0];
              if (subject.includes('!:') || commit.message.includes('BREAKING CHANGE')) {
                labelsToAdd.add('breaking-change');
              }
              const match = subject.match(/^(\w+)[\(!:]/);
              if (match && labelMap[match[1]]) {
                labelsToAdd.add(labelMap[match[1]]);
              }
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labelsToAdd],
              });
            }
