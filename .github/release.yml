# .github/release.yml
changelog:  # Applies based on merged PR labels
  exclude:
    labels:
      - dependencies
      - chore
      - ci
      - documentation
      - testing
    authors:
      - dependabot
      - renovate[bot]
  categories:
    - title: "🚀 Features & Improvements"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "🛠 Breaking Changes"
      labels:
        - breaking-change
        - breaking
