# Auto-label PRs based on changed files
# Labels feed into .github/release.yml for changelog generation
# fix, bug, security, breaking-change are applied manually

# Features & improvements
enhancement:
  - changed-files:
    - any-glob-to-any-file:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile'

# CI/CD & Automation
ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - 'renovate.json'

# Dependencies
dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'go.mod'
      - 'go.sum'

# Documentation
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

# Chore (non-functional)
chore:
  - changed-files:
    - any-glob-to-any-file:
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.dockerignore'
      - 'LICENSE'

# Testing
testing:
  - changed-files:
    - any-glob-to-any-file:
      - 'testing/**'
      - '**/*_test.go'
