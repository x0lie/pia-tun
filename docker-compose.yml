services:
  pia-tun:
    image: x0lie/pia-tun:latest
    container_name: pia-tun
    cap_add:
      - NET_ADMIN                                                             # Necessary
    cap_drop:
      - all                                                                   # Highly recommended
    environment:
      - TZ=America/New_York
      - PIA_LOCATION=ca_ontario,ca_ontario-so,ca_toronto,ca                   # Supports multiple options, chooses lowest latency
      - PF_ENABLED=true
      - PS_CLIENT=qbittorrent 
      - PROXY_ENABLED=true
      - LOCAL_NETWORKS=192.168.1.0/24,172.17.0.0/16
      - LOCAL_PORTS=8080,1080,8888
    secrets:
      - pia_user
      - pia_pass
      - ps_user
      - ps_pass
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/killswitch_up"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080                                                       # This port needs to be added to LOCAL_PORTS and ports: to access webui
    volumes:
      - ./qbittorrent/config:/config
      - ./qbittorrent/downloads:/downloads
    network_mode: "service:pia-tun"
    depends_on:
      pia-tun:
        condition: service_healthy

secrets:                                                                      # Supports pia_user, pia_pass, proxy_user, proxy_pass, ps_user, ps_pass
  pia_user:
    file: ./secrets/pia_user
  pia_pass:
    file: ./secrets/pia_pass
  ps_user:
    file: ./secrets/ps_user
  ps_pass:
    file: ./secrets/ps_pass